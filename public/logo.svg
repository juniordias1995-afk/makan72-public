<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3B0" />
      <stop offset="100%" stop-color="#6366F1" />
    </linearGradient>
    <filter id="logoGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Logo icon -->
  <g transform="translate(10, 10)">
    <!-- Chip icon -->
    <rect x="0" y="0" width="40" height="40" rx="6" fill="url(#logoGradient)" filter="url(#logoGlow)" />
    <rect x="8" y="8" width="24" height="24" rx="2" fill="none" stroke="white" stroke-width="1.5" opacity="0.4" />
    <circle cx="20" cy="20" r="3" fill="white" opacity="0.9" />
    
    <!-- Circuit details -->
    <path d="M10 15 L18 15 M22 15 L30 15 M10 25 L18 25 M22 25 L30 25 M15 10 L15 18 M25 10 L25 18 M15 30 L15 22 M25 30 L25 22" 
          stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.6" />
  </g>
  
  <!-- Logo text -->
  <g transform="translate(60, 20)">
    <!-- Makan72 text -->
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="url(#logoGradient)">
      Makan72
    </text>
    <text x="0" y="0" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="white" opacity="0.1">
      Makan72
    </text>
    
    <!-- .com subtitle -->
    <text x="145" y="5" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400" fill="#94A3B8">
      .com
    </text>
  </g>
</svg>
