<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="chipGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A3B0" />
      <stop offset="100%" stop-color="#6366F1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Chip body -->
  <rect x="4" y="4" width="24" height="24" rx="3" fill="url(#chipGradient)" filter="url(#glow)" />
  
  <!-- Chip details -->
  <rect x="8" y="8" width="16" height="16" rx="1" fill="none" stroke="white" stroke-width="1" opacity="0.3" />
  
  <!-- CPU pins (corners) -->
  <rect x="2" y="2" width="2" height="2" fill="#00A3B0" />
  <rect x="28" y="2" width="2" height="2" fill="#00A3B0" />
  <rect x="2" y="28" width="2" height="2" fill="#00A3B0" />
  <rect x="28" y="28" width="2" height="2" fill="#00A3B0" />
  
  <!-- Center dot -->
  <circle cx="16" cy="16" r="2" fill="white" opacity="0.8" />
  
  <!-- Circuit lines -->
  <path d="M8 12 L12 12 M20 12 L24 12 M8 20 L12 20 M20 20 L24 20 M12 8 L12 12 M20 8 L20 12 M12 24 L12 20 M20 24 L20 20" 
        stroke="white" stroke-width="1" stroke-linecap="round" opacity="0.5" />
</svg>
