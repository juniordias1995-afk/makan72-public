# GUARDRAILS.yaml — Limites de acção por tarefa
# Editável pelo CEO. Aplicado automaticamente pelo gate.sh (C5) e team-bot.sh

# Limites por tarefa individual
per_task:
  max_files_modified: 10          # Máximo de ficheiros que 1 tarefa pode alterar
  max_files_created: 5            # Máximo de ficheiros novos por tarefa
  max_files_deleted: 0            # Por defeito: agentes NÃO podem apagar ficheiros
  max_lines_changed: 500          # Máximo de linhas alteradas por tarefa

# Limites por sessão
per_session:
  max_total_files_modified: 50    # Máximo total de ficheiros por sessão
  max_total_handoffs: 20          # Máximo de handoffs (evitar loops)
  max_tasks_per_agent: 10         # Máximo de tarefas por agente por sessão

# Acções sensíveis (requerem aprovação explícita do CEO)
sensitive_actions:
  delete_files: true              # Apagar ficheiros requer aprovação
  modify_config: true             # Alterar team.yaml, agents.json requer aprovação
  modify_global_memory: true      # Alterar VERDADE.md, VACINAS.md requer aprovação
  modify_guardrails: true         # Alterar ESTE ficheiro requer aprovação do CEO
  run_shell_commands: false       # Shell commands livres (mudar para true se quiser aprovar)

# Pastas protegidas (agentes NUNCA podem escrever directamente)
protected_paths:
  - "01-config/agents.json"       # Só manage-agents.sh pode alterar
  - "01-config/GUARDRAILS.yaml"   # Só CEO pode alterar
  - "00-global/VERDADE.md"          # Só CEO/Líder pode alterar
  - "VERSION"                     # Só CEO pode alterar

# Protecção de ficheiros (v3.3 — Anti-lixo no Git)
file_policy:
  allowed_extensions:           # APENAS estas extensões podem ser criadas/commitadas
    - ".md"                     # Documentação e memória
    - ".yaml"                   # Configuração
    - ".yml"                    # Configuração (alternativo)
    - ".json"                   # Dados estruturados
    - ".sh"                     # Scripts
    - ".py"                     # Python (futuro)
    - ".txt"                    # Texto simples
    - ".log"                    # Logs (gitignored, mas permitido localmente)
    - ".mmd"                    # Diagramas Mermaid (visualização de fluxos)
    - ".d2"                     # Diagramas D2 (visualização declarativa)
  blocked_patterns:             # Ficheiros/pastas SEMPRE bloqueados
    - "tmp_*"                   # Temporários de agentes
    - "*.tmp"                   # Temporários genéricos
    - "*.bak"                   # Backups soltos
    - "*.swp"                   # Swap de editores
    - "node_modules/"           # Dependências JS (se aplicável)
  max_file_size_kb: 500         # Ficheiro > 500KB requer aprovação do CEO

# Excepções por MODO
mode_overrides:
  ML:  # Líder tem mais liberdade
    max_files_modified: 20
    max_files_deleted: 5
    modify_global_memory: false   # Líder pode alterar memória global sem pedir
  MO:  # Operário tem limites mais apertados
    max_files_modified: 5
    max_lines_changed: 200
