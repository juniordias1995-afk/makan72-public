# AGENT_CONFIG.yaml — Configuração individual de agente
# Criado por manage-agents.sh ao adicionar um agente
# Localização: 01-config/agents/{CODE}.yaml

agent:
  code: "{CODE}"
  name: "{NOME_COMPLETO}"
  model: "{MODELO}"
  cli: "{COMANDO_CLI}"
  tab: 0
  status: "active"
  added_date: "{YYYY-MM-DD}"

capabilities:
  modos_possiveis: []   # Preenchido pelo CEO
  editor_nativo: false
  usa_aider: false
  usa_docker: false

preferences:
  verbosidade: "COMPACTO"
  max_tokens_context: 32000
  language: "pt"
