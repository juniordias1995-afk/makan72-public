# Estrutura específica para CLI Tools
folders:
  - src/commands/
  - src/utils/
  - tests/commands/

files:
  - name: src/__init__.py
    content: ""

  - name: src/__main__.py
    content: |
      from src.cli import cli

      if __name__ == "__main__":
          cli()

  - name: src/cli.py
    content: |
      import click
      from rich.console import Console

      console = Console()

      @click.group()
      @click.version_option(version="0.1.0")
      def cli():
          """{PROJECT_NAME} — CLI tool"""
          pass

      @cli.command()
      def hello():
          """Say hello"""
          console.print("[bold green]Hello from {PROJECT_NAME}![/bold green]")

      if __name__ == "__main__":
          cli()

  - name: src/commands/__init__.py
    content: ""

  - name: src/utils/__init__.py
    content: ""

  - name: requirements.txt
    content: |
      click>=8.1.0
      rich>=13.0.0
      pytest>=7.0.0

  - name: pyproject.toml
    content: |
      [project]
      name = "{PROJECT_NAME_LOWER}"
      version = "0.1.0"
      requires-python = ">=3.11"
      dependencies = [
          "click>=8.1.0",
          "rich>=13.0.0",
      ]

      [project.scripts]
      {PROJECT_NAME_LOWER} = "src.cli:cli"

      [tool.ruff]
      line-length = 120
      target-version = "py311"

  - name: docs/CLI_DESIGN.md
    content: |
      # CLI Design

      ## Comandos

      | Comando | Descrição |
      |---------|-----------|
      | hello | Say hello (exemplo) |
      | (adicionar mais) | ... |

      ## Opções globais
      - --version
      - --help
      - --verbose (futuro)

  - name: docs/STACK.md
    content: |
      # Stack Tecnológica

      - **Framework:** Click
      - **Output:** Rich (cores, tabelas, progresso)
      - **Linguagem:** Python 3.11+
      - **Testes:** pytest
      - **Linting:** ruff (line-length 120)
      - **Packaging:** pip / PyPI

steps:
  - name: design
    description: "Definir comandos e opções"
    action: "Preencher docs/CLI_DESIGN.md"
  - name: commands
    description: "Criar comandos com Click"
    action: "Implementar em src/commands/"
  - name: utils
    description: "Criar funções auxiliares"
    action: "Implementar em src/utils/"
  - name: output
    description: "Formatar output com Rich"
    action: "Tabelas, cores, progress bars"
  - name: test
    description: "Testar comandos"
    action: "pytest tests/ -v"
  - name: package
    description: "Configurar pyproject.toml"
    action: "pip install -e ."
  - name: publish
    description: "(opcional) Publicar no PyPI"
    action: "python -m build && twine upload"
