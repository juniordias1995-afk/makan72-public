# Estrutura específica para projectos Desktop (Tauri)
folders:
  - src/components/
  - src/pages/
  - src/hooks/
  - src/utils/
  - src-tauri/src/
  - src-tauri/icons/
  - assets/
  - tests/

files:
  - name: src/App.tsx
    content: |
      import React from 'react'

      function App() {
        return (
          <div>
            <h1>{PROJECT_NAME}</h1>
            <p>Desktop app powered by Tauri</p>
          </div>
        )
      }

      export default App

  - name: src/main.tsx
    content: |
      import React from 'react'
      import ReactDOM from 'react-dom/client'
      import App from './App'

      ReactDOM.createRoot(document.getElementById('root')!).render(
        <React.StrictMode>
          <App />
        </React.StrictMode>
      )

  - name: src-tauri/src/main.rs
    content: |
      #![cfg_attr(not(debug_assertions), windows_subsystem = "windows")]

      fn main() {
          tauri::Builder::default()
              .run(tauri::generate_context!())
              .expect("error while running tauri application");
      }

  - name: src-tauri/Cargo.toml
    content: |
      [package]
      name = "{PROJECT_NAME_LOWER}"
      version = "0.1.0"
      edition = "2021"

      [dependencies]
      tauri = { version = "2", features = [] }
      serde = { version = "1", features = ["derive"] }
      serde_json = "1"

  - name: src-tauri/tauri.conf.json
    content: |
      {
        "productName": "{PROJECT_NAME}",
        "version": "0.1.0",
        "identifier": "com.makan72.{PROJECT_NAME_LOWER}",
        "build": {
          "frontendDist": "../dist"
        },
        "app": {
          "title": "{PROJECT_NAME}",
          "windows": [
            {
              "width": 1024,
              "height": 768
            }
          ]
        }
      }

  - name: package.json
    content: |
      {
        "name": "{PROJECT_NAME_LOWER}",
        "version": "0.1.0",
        "scripts": {
          "dev": "vite",
          "build": "tsc && vite build",
          "tauri": "tauri"
        }
      }

  - name: docs/DESIGN.md
    content: |
      # Design da App Desktop

      ## Janelas
      - [ ] Main window
      - [ ] Settings
      - [ ] (adicionar mais)

      ## Funcionalidades nativas (Rust)
      - [ ] Acesso ao filesystem
      - [ ] System tray
      - [ ] (adicionar mais)

      ## Platforms
      - [ ] Windows
      - [ ] macOS
      - [ ] Linux

  - name: docs/STACK.md
    content: |
      # Stack Tecnológica

      - **Framework:** Tauri 2.x
      - **Frontend:** React + Vite + TypeScript
      - **Backend:** Rust
      - **Testes:** Vitest (frontend) + cargo test (Rust)
      - **Build:** .exe (Win), .dmg (Mac), .AppImage (Linux)

steps:
  - name: design
    description: "Criar mockup e definir funcionalidades"
    action: "Preencher docs/DESIGN.md"
  - name: frontend
    description: "Criar UI com React"
    action: "Implementar em src/components/ e src/pages/"
  - name: rust
    description: "Criar operações nativas em Rust"
    action: "Implementar em src-tauri/src/"
  - name: integrate
    description: "Ligar frontend com Rust (Tauri commands)"
    action: "invoke() e #[tauri::command]"
  - name: test
    description: "Testar em cada OS"
    action: "cargo tauri dev"
  - name: build
    description: "Build nativo para cada plataforma"
    action: "cargo tauri build"
