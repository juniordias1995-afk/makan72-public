# Estrutura específica para projectos API/Backend
folders:
  - src/routes/
  - src/models/
  - src/schemas/
  - src/services/
  - tests/routes/

files:
  - name: src/main.py
    content: |
      from fastapi import FastAPI

      app = FastAPI(
          title="{PROJECT_NAME}",
          version="0.1.0",
      )

      @app.get("/health")
      def health_check():
          return {"status": "ok"}

  - name: src/schemas/__init__.py
    content: ""

  - name: src/models/__init__.py
    content: ""

  - name: src/routes/__init__.py
    content: ""

  - name: src/services/__init__.py
    content: ""

  - name: requirements.txt
    content: |
      fastapi>=0.100.0
      pydantic>=2.0.0
      uvicorn>=0.20.0
      httpx>=0.24.0
      pytest>=7.0.0

  - name: pyproject.toml
    content: |
      [project]
      name = "{PROJECT_NAME_LOWER}"
      version = "0.1.0"
      requires-python = ">=3.11"

      [tool.ruff]
      line-length = 120
      target-version = "py311"

  - name: docs/API_DESIGN.md
    content: |
      # API Design

      ## Endpoints

      | Método | Path | Descrição |
      |--------|------|-----------|
      | GET | /health | Health check |
      | GET | /api/v1/... | (a definir) |
      | POST | /api/v1/... | (a definir) |

      ## Modelos
      (a definir)

      ## Autenticação
      (a definir)

  - name: docs/STACK.md
    content: |
      # Stack Tecnológica

      - **Framework:** FastAPI
      - **Validação:** Pydantic v2
      - **Testes:** pytest + httpx
      - **Linting:** ruff (line-length 120)
      - **Deploy:** Railway / Docker

  - name: Dockerfile
    content: |
      FROM python:3.11-slim
      WORKDIR /app
      COPY requirements.txt .
      RUN pip install -r requirements.txt
      COPY src/ ./src/
      CMD ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000"]

steps:
  - name: design
    description: "Definir endpoints e modelos"
    action: "Preencher docs/API_DESIGN.md"
  - name: models
    description: "Criar modelos de dados"
    action: "Implementar em src/models/"
  - name: schemas
    description: "Criar Pydantic schemas"
    action: "Implementar em src/schemas/"
  - name: routes
    description: "Criar endpoints"
    action: "Implementar em src/routes/"
  - name: services
    description: "Criar business logic"
    action: "Implementar em src/services/"
  - name: test
    description: "Testar endpoints"
    action: "pytest tests/ -v"
  - name: docs
    description: "Verificar Swagger UI"
    action: "uvicorn src.main:app → /docs"
  - name: deploy
    description: "Deploy"
    action: "docker build + push"
