# Estrutura específica para projectos Web
folders:
  - src/pages/
  - src/components/
  - src/hooks/
  - src/utils/
  - src/styles/
  - public/
  - public/images/

files:
  - name: src/App.tsx
    content: |
      import React from 'react'

      function App() {
        return (
          <div>
            <h1>{PROJECT_NAME}</h1>
          </div>
        )
      }

      export default App

  - name: src/main.tsx
    content: |
      import React from 'react'
      import ReactDOM from 'react-dom/client'
      import App from './App'

      ReactDOM.createRoot(document.getElementById('root')!).render(
        <React.StrictMode>
          <App />
        </React.StrictMode>
      )

  - name: package.json
    content: |
      {
        "name": "{PROJECT_NAME_LOWER}",
        "version": "0.1.0",
        "scripts": {
          "dev": "vite",
          "build": "tsc && vite build",
          "preview": "vite preview",
          "test": "vitest"
        }
      }

  - name: docs/DESIGN.md
    content: |
      # Design do Site

      ## Páginas
      - [ ] Home
      - [ ] About
      - [ ] Contact

      ## Componentes
      (a definir)

      ## Responsive
      - [ ] Mobile (< 768px)
      - [ ] Tablet (768px - 1024px)
      - [ ] Desktop (> 1024px)

  - name: docs/STACK.md
    content: |
      # Stack Tecnológica

      - **Frontend:** React 18 + Vite + TypeScript
      - **Styling:** Tailwind CSS
      - **Testes:** Vitest + React Testing Library
      - **Deploy:** Vercel

steps:
  - name: design
    description: "Criar mockup e definir páginas"
    action: "Preencher docs/DESIGN.md"
  - name: frontend
    description: "Criar páginas e componentes React"
    action: "Implementar em src/pages/ e src/components/"
  - name: styling
    description: "Aplicar Tailwind CSS"
    action: "Estilizar componentes"
  - name: responsive
    description: "Testar em mobile, tablet, desktop"
    action: "Verificar breakpoints"
  - name: seo
    description: "Meta tags, sitemap, Open Graph"
    action: "Adicionar ao index.html"
  - name: deploy
    description: "Deploy para Vercel"
    action: "vercel deploy"
