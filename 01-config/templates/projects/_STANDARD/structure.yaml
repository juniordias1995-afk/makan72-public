# Pastas e ficheiros comuns a TODOS os projectos
folders:
  - docs/
  - tests/
  - src/

files:
  - name: README.md
    content: |
      # {PROJECT_NAME}

      > Criado com Makan72 — template: {TEMPLATE_NAME}

      ## Descrição
      {DESCRIPTION}

      ## Stack
      Ver `docs/STACK.md`

      ## Como usar
      (a preencher)

  - name: .gitignore
    content: |
      # Dependencies
      node_modules/
      __pycache__/
      .venv/
      venv/

      # Build
      dist/
      build/
      *.egg-info/

      # Environment
      .env
      .env.local

      # IDE
      .vscode/
      .idea/

      # OS
      .DS_Store
      Thumbs.db

  - name: LICENSE
    content: "MIT (default — CEO escolhe)"

  - name: docs/PLAN.md
    content: |
      # Plano do Projecto

      ## Objectivo
      (a preencher)

      ## Milestones
      - [ ] Milestone 1
      - [ ] Milestone 2
      - [ ] Milestone 3

steps:
  - name: init
    description: "Inicializar repositório git"
    action: "git init"
  - name: plan
    description: "Criar plano do projecto"
    action: "Preencher docs/PLAN.md"
  - name: build
    description: "Desenvolver código"
    action: "Implementar em src/"
  - name: test
    description: "Testar tudo"
    action: "Correr testes em tests/"
  - name: deploy
    description: "Fazer deploy"
    action: "Depende do template específico"
