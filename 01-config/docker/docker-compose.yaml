services:
  claude:
    build: .
    container_name: makan72-claude
    volumes:
      - ${MAKAN72_HOME}/00-global:/makan72/00-global:ro
      - ${MAKAN72_HOME}/03-inbox/CLAUDE:/makan72/inbox
      - ${MAKAN72_HOME}/04-bus:/makan72/bus
      - ${MAKAN72_HOME}/09-workspace:/makan72/workspace
    environment:
      - AGENT_CODE=CLAUDE
      - MAKAN72_HOME=/makan72

  qwen:
    build: .
    container_name: makan72-qwen
    volumes:
      - ${MAKAN72_HOME}/00-global:/makan72/00-global:ro
      - ${MAKAN72_HOME}/03-inbox/QWEN:/makan72/inbox
      - ${MAKAN72_HOME}/04-bus:/makan72/bus
      - ${MAKAN72_HOME}/09-workspace:/makan72/workspace
    environment:
      - AGENT_CODE=QWEN
      - MAKAN72_HOME=/makan72

  gemini:
    build: .
    container_name: makan72-gemini
    volumes:
      - ${MAKAN72_HOME}/00-global:/makan72/00-global:ro
      - ${MAKAN72_HOME}/03-inbox/GEMINI:/makan72/inbox
      - ${MAKAN72_HOME}/04-bus:/makan72/bus
      - ${MAKAN72_HOME}/09-workspace:/makan72/workspace
    environment:
      - AGENT_CODE=GEMINI
      - MAKAN72_HOME=/makan72
